<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#7fb8e6" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Kite Rush" />
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Crect%20width='32'%20height='32'%20rx='6'%20fill='%237fb8e6'/%3E%3Cpolygon%20points='16,4%2027,16%2016,28%205,16'%20fill='%23fff7ec'/%3E%3Cpolygon%20points='16,4%2027,16%2016,16%205,16'%20fill='%23ff5436'/%3E%3C/svg%3E" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="description" content="Launch your kite and climb the sky — dodge birds, ride gusts, pull tricks, and chase the high score." />
<title>Kite Rush</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --gold:#ffd23f; --paper:#fff7ec; --vermilion:#ff5436; }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:#0d1b33;font-family:'Fredoka',system-ui,sans-serif;}
  #game{position:fixed;inset:0;touch-action:none;}
  canvas{display:block;width:100%;height:100%;}

  .overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:28px;color:var(--paper);z-index:10;transition:opacity .35s ease;}
  #menu{background:linear-gradient(180deg, rgba(8,16,34,.46) 0%, rgba(8,16,34,.16) 32%, rgba(8,16,34,.22) 62%, rgba(8,16,34,.55) 100%);}
  #over,#pause,#shop,#hub{background:rgba(8,16,34,.58);}
  .hidden{opacity:0;pointer-events:none;}

  .title{font-weight:700;letter-spacing:1px;line-height:.92;font-size:clamp(54px,17vw,108px);
    color:var(--paper);text-shadow:0 4px 0 rgba(0,0,0,.18),0 14px 34px rgba(0,0,0,.35);}
  .title .rush{color:var(--gold);}
  .tag{margin-top:10px;font-size:clamp(15px,4.2vw,20px);font-weight:500;opacity:.95;letter-spacing:.5px;
    text-shadow:0 2px 10px rgba(0,0,0,.5);}

  .btn{margin-top:26px;border:none;cursor:pointer;font-family:inherit;font-weight:600;
    font-size:clamp(20px,5.5vw,26px);color:#3a1c00;
    background:linear-gradient(180deg,#ffe27a,var(--gold));
    padding:16px 46px;border-radius:999px;box-shadow:0 6px 0 #c79a1f,0 14px 26px rgba(0,0,0,.35);
    transition:transform .08s ease,box-shadow .08s ease;}
  .btn:active{transform:translateY(4px);box-shadow:0 2px 0 #c79a1f,0 8px 16px rgba(0,0,0,.35);}
  .btn.secondary{background:rgba(255,255,255,.16);color:var(--paper);box-shadow:0 4px 0 rgba(0,0,0,.25);
    font-size:clamp(15px,4vw,18px);padding:12px 28px;margin-top:14px;}
  .btn.secondary:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.25);}

  .hint{margin-top:22px;font-size:clamp(13px,3.6vw,16px);font-weight:400;max-width:330px;line-height:1.55;
    color:#eef3ff;background:rgba(8,16,34,.42);padding:11px 15px;border-radius:14px;
    border:1px solid rgba(255,255,255,.10);text-shadow:0 1px 6px rgba(0,0,0,.5);}
  .best{margin-top:18px;font-size:clamp(15px,4vw,19px);font-weight:600;opacity:.95;}
  .best b{color:var(--gold);}

  .gostat{font-size:clamp(15px,4.2vw,19px);font-weight:500;opacity:.92;margin-top:4px;}
  .gobig{font-size:clamp(56px,16vw,104px);font-weight:700;color:var(--gold);line-height:1;
    text-shadow:0 4px 0 rgba(0,0,0,.18),0 12px 28px rgba(0,0,0,.4);}
  .golabel{font-weight:600;font-size:clamp(20px,6vw,30px);letter-spacing:2px;opacity:.95;text-transform:uppercase;}
  .newbest{display:inline-block;margin-top:10px;padding:5px 16px;border-radius:999px;
    background:var(--vermilion);color:#fff;font-weight:600;font-size:clamp(13px,3.6vw,15px);letter-spacing:1px;}

  .soon{display:flex;gap:10px;margin-top:22px;flex-wrap:wrap;justify-content:center;}
  .chip{font-size:12px;font-weight:500;letter-spacing:.4px;padding:7px 14px;border-radius:999px;
    background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);opacity:.85;}

  .topbar{position:fixed;top:0;left:0;right:0;display:flex;justify-content:flex-end;gap:10px;
    padding:max(14px,env(safe-area-inset-top)) 18px 0;z-index:8;}
  .sound{cursor:pointer;width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;
    font-size:20px;background:rgba(0,0,0,.20);backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.16);color:#fff;}
  .credit{position:fixed;bottom:max(8px,env(safe-area-inset-bottom));left:0;right:0;text-align:center;
    font-size:11px;color:rgba(255,255,255,.45);z-index:8;pointer-events:none;letter-spacing:.5px;}
  #toast{position:fixed;left:50%;bottom:18%;transform:translateX(-50%) translateY(10px);z-index:20;
    background:rgba(20,30,55,.92);color:var(--paper);padding:12px 20px;border-radius:14px;font-weight:500;
    font-size:15px;opacity:0;pointer-events:none;transition:opacity .25s ease,transform .25s ease;
    border:1px solid rgba(255,255,255,.16);max-width:80vw;text-align:center;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .wallet{margin-top:14px;font-size:clamp(17px,4.6vw,21px);font-weight:600;color:var(--gold);letter-spacing:.5px;}
  .missions{margin-top:14px;display:flex;flex-direction:column;gap:8px;width:min(340px,86vw);}
  .mrow{display:flex;align-items:center;justify-content:space-between;gap:10px;
    background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.16);border-radius:12px;
    padding:9px 13px;font-size:clamp(12px,3.5vw,14px);font-weight:500;text-align:left;}
  .mrow .mr-d{flex:1;opacity:.95;}
  .mrow .mr-r{color:var(--gold);font-weight:600;white-space:nowrap;}
  .mrow.done{opacity:.55;}
  .mrow.done .mr-d{text-decoration:line-through;}
  .medal{font-size:clamp(34px,10vw,56px);margin:2px 0 2px;line-height:1;}
  .medal small{display:block;font-size:clamp(13px,3.6vw,15px);font-weight:600;letter-spacing:1px;opacity:.92;margin-top:2px;}
  .shopgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;width:min(360px,88vw);
    max-height:56vh;overflow-y:auto;padding:4px;margin:14px 0;}
  .scard{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);border-radius:16px;
    padding:12px 10px;display:flex;flex-direction:column;align-items:center;gap:7px;}
  .scard.eq{border-color:var(--gold);box-shadow:inset 0 0 0 2px rgba(255,210,63,.45);}
  .scard .sn{font-weight:600;font-size:14px;}
  .sbtn{border:none;border-radius:999px;padding:7px 16px;font-family:inherit;font-weight:600;font-size:13px;cursor:pointer;
    background:linear-gradient(180deg,#ffe27a,var(--gold));color:#3a1c00;}
  .sbtn.equip{background:rgba(255,255,255,.18);color:#fff;}
  .sbtn.equipped{background:transparent;color:var(--gold);border:1px solid var(--gold);}
  .sbtn.lock{opacity:.45;}
  .mrow .mr-p{opacity:.75;font-weight:600;white-space:nowrap;}
  .mhead{font-size:13px;font-weight:600;letter-spacing:1.2px;opacity:.85;text-align:left;}
  .pilot{margin-top:10px;display:flex;flex-direction:column;align-items:center;gap:5px;font-weight:600;
    font-size:clamp(14px,3.8vw,17px);color:#eef3ff;text-shadow:0 1px 6px rgba(0,0,0,.5);}
  .xpbar{width:min(240px,60vw);height:8px;border-radius:99px;background:rgba(255,255,255,.18);overflow:hidden;}
  .xpfill{height:100%;border-radius:99px;background:linear-gradient(90deg,#7fe3ff,#ffd23f);}
  .btnrow{display:flex;gap:10px;}
  .hubscroll{width:min(380px,92vw);max-height:60vh;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding:4px;margin-top:10px;}
  .hubh{font-weight:700;font-size:14px;letter-spacing:1px;margin-top:8px;text-align:left;color:var(--gold);}
  .achgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
  .acard{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:12px;padding:8px 10px;text-align:left;}
  .acard.got{border-color:var(--gold);}
  .acard.dim{opacity:.45;}
  .acard .an{font-weight:600;font-size:13px;}
  .acard .ad{font-size:11px;opacity:.75;margin-top:2px;}
  .dealcard{background:linear-gradient(135deg,rgba(255,210,63,.16),rgba(255,92,138,.14));border:1px solid rgba(255,210,63,.5)!important;}
  .dealtag{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--gold);}
  .oldp{opacity:.6;text-decoration:line-through;margin-right:5px;font-size:11px;}
  .shead{grid-column:1/-1;text-align:left;font-weight:700;font-size:13px;letter-spacing:1px;color:var(--gold);margin-top:4px;}
</style>
</head>
<body>
<div id="game">
  <canvas id="c"></canvas>
  <div class="topbar">
    <div class="sound" id="pauseBtn" style="display:none"><svg width="16" height="16" viewBox="0 0 16 16" fill="#fff"><rect x="2.5" y="1.5" width="4" height="13" rx="1.4"/><rect x="9.5" y="1.5" width="4" height="13" rx="1.4"/></svg></div>
    <div class="sound" id="sound"></div>
  </div>

  <div class="overlay" id="menu">
    <div class="title">KITE<span class="rush"> RUSH</span></div>
    <div class="tag">Launch it. Climb the sky.</div>
    <button class="btn" id="play">Fly</button>
    <div class="wallet" id="wallet"></div>
    <div class="pilot" id="pilotLine"></div>
    <div class="missions" id="missions"></div>
    <div class="btnrow">
      <button class="btn secondary" id="hubBtn">🎯 Challenges</button>
      <button class="btn secondary" id="shopBtn">🎀 Shop</button>
    </div>
    <div class="best" id="menuBest"></div>
    <div class="hint"><b>Tap</b> to launch (hold for power), <b>drag</b> to steer, <b>flick ↑/↓</b> for loops &amp; dives, graze birds, and grab the rainbow ✦ for <b>FRENZY</b>. Complete missions to earn 🎀 Ribbons.</div>
  </div>

  <div class="overlay hidden" id="over">
    <div class="golabel" id="goLabel">Grounded</div>
    <div class="gobig" id="goScore">0</div>
    <div id="goMedal" class="medal"></div>
    <div class="gostat" id="goStats"></div>
    <div class="gostat" id="goRibbons"></div>
    <div class="gostat" id="goXP"></div>
    <div class="gostat" id="goDaily" style="color:var(--gold)"></div>
    <div id="goNew"></div>
    <button class="btn" id="continue" style="display:none">Continue ♻︎</button>
    <button class="btn" id="again">Fly Again</button>
    <button class="btn secondary" id="share">Share Score</button>
    <button class="btn secondary" id="home">Home</button>
  </div>

  <div class="overlay hidden" id="pause">
    <div class="golabel">Paused</div>
    <button class="btn" id="resume">Resume</button>
    <button class="btn secondary" id="quit">Quit to Menu</button>
  </div>

  <div class="overlay hidden" id="shop">
    <div class="golabel">Kite Shop</div>
    <div class="wallet" id="shopWallet"></div>
    <div class="shopgrid" id="shopGrid"></div>
    <button class="btn secondary" id="shopBack">Back</button>
  </div>

  <div class="overlay hidden" id="hub">
    <div class="golabel">Challenges</div>
    <div class="hubscroll" id="hubContent"></div>
    <button class="btn secondary" id="hubBack">Back</button>
  </div>

  <div id="toast"></div>
</div>

<script>
(() => {
  "use strict";
  const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
  const menuEl=document.getElementById('menu'), overEl=document.getElementById('over');

  let W=0,H=0,DPR=1;
  function resize(){
    DPR=Math.min(window.devicePixelRatio||1,2);
    W=window.innerWidth; H=window.innerHeight;
    canvas.width=Math.floor(W*DPR); canvas.height=Math.floor(H*DPR);
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  window.addEventListener('resize',resize); resize();

  // persistence
  function loadBest(){ try{return parseInt(localStorage.getItem('kiterush_best_v2')||'0',10)||0;}catch(e){return 0;} }
  function saveBest(v){ try{localStorage.setItem('kiterush_best_v2',String(v));}catch(e){} }
  let best=loadBest();
  let ribbons=0, activeMissions=[], ghostData=null;
  try{ ribbons=parseInt(localStorage.getItem('kiterush_ribbons')||'0',10)||0; }catch(e){}
  function saveWallet(){ try{localStorage.setItem('kiterush_ribbons',String(ribbons));}catch(e){} }

  // ---- missions ----
  const MPOOL=[
    {id:'height',targets:[600,1000,1500,2200,3000]},
    {id:'stars',targets:[12,20,30]},
    {id:'graze',targets:[3,5,8]},
    {id:'tricks',targets:[3,5,8]},
    {id:'cow',targets:[1,2]},
    {id:'gust',targets:[2,3]},
    {id:'combo',targets:[5,8,12]},
    {id:'nohit',targets:[700,1200]},
    {id:'frenzy',targets:[3,6]},
  ];
  function genMission(exclude){
    const opts=MPOOL.filter(p=>!exclude.includes(p.id));
    const p=opts[(Math.random()*opts.length)|0]; const idx=(Math.random()*p.targets.length)|0;
    return {id:p.id, target:p.targets[idx], reward:25+idx*20, done:false};
  }
  function loadMissions(){
    try{ const raw=localStorage.getItem('kiterush_missions'); if(raw){ const a=JSON.parse(raw); if(Array.isArray(a)&&a.length===3) return a; } }catch(e){}
    const m=[]; while(m.length<3) m.push(genMission(m.map(x=>x.id))); saveMissions(m); return m;
  }
  function saveMissions(m){ try{localStorage.setItem('kiterush_missions',JSON.stringify(m||activeMissions));}catch(e){} }
  function rollDoneMissions(){ // replace completed missions with fresh ones
    let changed=false;
    for(let i=0;i<activeMissions.length;i++){ if(activeMissions[i].done){ activeMissions[i]=genMission(activeMissions.map(x=>x.id)); changed=true; } }
    if(changed) saveMissions();
  }
  function missionDesc(m){ const t=m.target; switch(m.id){
    case 'height':return `Reach ${t.toLocaleString()} m`;
    case 'stars':return `Collect ${t} stars`;
    case 'graze':return `Graze ${t} birds`;
    case 'tricks':return `Land ${t} tricks`;
    case 'cow':return `Catch ${t} critter${t>1?'s':''}`;
    case 'gust':return `Ride ${t} gusts`;
    case 'combo':return `Hit a ×${t} combo`;
    case 'nohit':return `Reach ${t.toLocaleString()} m, no hits`;
    case 'frenzy':return `Smash ${t} foes in Frenzy`;
  } return ''; }
  function missionProg(m){ const h=Math.floor(altitude); switch(m.id){
    case 'height':return Math.min(h,m.target);
    case 'stars':return starsHit;
    case 'graze':return dodges;
    case 'tricks':return tricksLanded;
    case 'cow':return cowsGot;
    case 'gust':return gustsGot;
    case 'combo':return maxCombo;
    case 'nohit':return hitCount===0?Math.min(h,m.target):0;
    case 'frenzy':return frenzyKills;
  } return 0; }
  function claimDaily(){
    const today=dayKey();
    let last=null, streak=0;
    try{ last=localStorage.getItem('kiterush_daily'); streak=parseInt(localStorage.getItem('kiterush_streak')||'0',10)||0; }catch(e){}
    if(last===today) return null;
    let cont=false; if(last){ const diff=Math.round((new Date(today)-new Date(last))/86400000); cont=diff===1; }
    streak=cont?streak+1:1;
    const reward=20+Math.min(streak,7)*10;
    ribbons+=reward; saveWallet();
    try{ localStorage.setItem('kiterush_daily',today); localStorage.setItem('kiterush_streak',String(streak)); }catch(e){}
    return {reward,streak};
  }
  activeMissions=loadMissions();

  // ---- daily challenges (seeded by local date, reset at midnight) ----
  function dayKey(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
  function hashStr(s){ let h=2166136261; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619); } return h>>>0; }
  function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
  const DPOOL=[
    {id:'stars',t:[25,40,60],cum:true},{id:'graze',t:[6,10,16],cum:true},{id:'tricks',t:[6,10,15],cum:true},
    {id:'height',t:[800,1500,2500],cum:false},{id:'combo',t:[6,10,14],cum:false},
    {id:'cow',t:[1,2,3],cum:true},{id:'gust',t:[3,5,8],cum:true},{id:'frenzy',t:[4,8,12],cum:true},
  ];
  let daily=null;
  function saveDaily(){ try{ localStorage.setItem('kiterush_dailych',JSON.stringify(daily)); }catch(e){} }
  function loadDaily(){
    const today=dayKey();
    try{ const raw=localStorage.getItem('kiterush_dailych');
      if(raw){ const d=JSON.parse(raw); if(d&&d.date===today&&Array.isArray(d.ch)&&d.ch.length===3) return d; } }catch(e){}
    const rng=mulberry32(hashStr('kr-'+today)); const pool=DPOOL.slice(); const ch=[];
    for(let k=0;k<3;k++){ const p=pool.splice((rng()*pool.length)|0,1)[0]; const ti=(rng()*p.t.length)|0;
      ch.push({id:p.id,target:p.t[ti],cum:!!p.cum,prog:0,done:false,reward:40+ti*25}); }
    daily={date:today,ch,bonus:false}; saveDaily(); return daily;
  }
  daily=loadDaily();
  function freshDaily(){ if(!daily||daily.date!==dayKey()) daily=loadDaily(); }

  // ---- pilot XP / levels ----
  let xp=0; try{ xp=parseInt(localStorage.getItem('kiterush_xp')||'0',10)||0; }catch(e){}
  function saveXp(){ try{ localStorage.setItem('kiterush_xp',String(xp)); }catch(e){} }
  function levelFor(x){ let lv=1,need=100; while(x>=need&&lv<99){ x-=need; lv++; need=Math.round(100*Math.pow(lv,1.35)); } return {lv,into:x,need}; }

  // ---- lifetime stats + achievements ----
  let stats={m:0,stars:0,graze:0,tricks:0,cows:0,frenzy:0,gusts:0,runs:0,bestAlt:0,bestCombo:0,dailies:0};
  try{ const s=JSON.parse(localStorage.getItem('kiterush_stats')||'null'); if(s) stats=Object.assign(stats,s); }catch(e){}
  function saveStats(){ try{ localStorage.setItem('kiterush_stats',JSON.stringify(stats)); }catch(e){} }
  let achieved=new Set(); try{ achieved=new Set(JSON.parse(localStorage.getItem('kiterush_ach')||'[]')); }catch(e){}
  function saveAch(){ try{ localStorage.setItem('kiterush_ach',JSON.stringify([...achieved])); }catch(e){} }
  const ACH=[
    {id:'m10k',  name:'Frequent Flyer',    desc:'Fly 10,000 m total',        ck:s=>s.m>=10000},
    {id:'m50k',  name:'Sky Marathon',      desc:'Fly 50,000 m total',        ck:s=>s.m>=50000},
    {id:'star500',name:'Star Hoarder',     desc:'Collect 500 stars',         ck:s=>s.stars>=500},
    {id:'graze100',name:'Feather Duster',  desc:'Graze 100 birds',           ck:s=>s.graze>=100},
    {id:'trick100',name:'Showoff',         desc:'Land 100 tricks',           ck:s=>s.tricks>=100},
    {id:'run5k', name:'Edge of Space',     desc:'Reach 5,000 m in one run',  ck:s=>s.bestAlt>=5000},
    {id:'combo15',name:'Chain Lightning',  desc:'Hit a ×15 combo',           ck:s=>s.bestCombo>=15},
    {id:'cow25', name:'Critter Collector', desc:'Catch 25 critters',         ck:s=>s.cows>=25},
    {id:'smash50',name:'Wrecking Kite',    desc:'50 Frenzy smashes',         ck:s=>s.frenzy>=50},
    {id:'runs100',name:'Regular',          desc:'Play 100 runs',             ck:s=>s.runs>=100},
    {id:'daily10',name:'Daily Grind',      desc:'Complete 10 daily challenges',ck:s=>s.dailies>=10},
    {id:'skins5',name:'Fashionista',       desc:'Own 5 shop cosmetics',      ck:()=> (ownedSkins.size-1)+(ownedTails.size-1)+(ownedTrails.size-1)>=5},
  ];

  // ---- cosmetic skins ----
  const SKINS=[
    {id:'classic',name:'Classic',price:0,  body:'#ff5436',wing:'#fff7ec',accent:'#ffd23f',tail:['#ff5436','#fff7ec']},
    {id:'sunset', name:'Sunset', price:120,body:'#ff7e5f',wing:'#fff3e6',accent:'#feb47b',tail:['#ff7e5f','#feb47b']},
    {id:'mint',   name:'Mint',   price:150,body:'#2ec4b6',wing:'#f0fff9',accent:'#9ef0e4',tail:['#2ec4b6','#bdf3ec']},
    {id:'cherry', name:'Cherry', price:180,body:'#ff3b6b',wing:'#fff0f5',accent:'#ffd23f',tail:['#ff3b6b','#ffd0de']},
    {id:'galaxy', name:'Galaxy', price:720,lv:6,body:'#6a4cff',wing:'#e9e4ff',accent:'#c08bff',tail:['#6a4cff','#c08bff']},

    // daily challenges (progress accumulates all day)
    freshDaily();
    const feats=[];
    const DMAP={stars:d.stars,graze:d.dodges,tricks:d.tricks,cow:d.cows,gust:d.gusts,frenzy:d.frenzy};
    for(const c of daily.ch){
      if(c.done) continue;
      c.prog = c.cum ? c.prog+Math.max(0,DMAP[c.id]||0) : Math.max(c.prog, missionProg(c));
      if(c.prog>=c.target){ c.done=true; ribbons+=c.reward; xp+=40; stats.dailies++;
        feats.push(`⚡ Daily: ${missionDesc(c)} · +${c.reward}🎀`); }
    }
    if(!daily.bonus && daily.ch.every(c=>c.done)){ daily.bonus=true; ribbons+=150; xp+=80; feats.push('⚡ ALL 3 CLEARED · +150🎀'); }
    saveDaily();
    // XP + level
    const prevLv=levelFor(xp).lv;
    const xpGain=Math.max(0,Math.round(d.alt*0.12+d.stars+d.tricks*2+d.dodges*2+d.cows*8+d.frenzy));
    xp+=xpGain;
    // achievements
    for(const a of ACH){ if(!achieved.has(a.id)&&a.ck(stats)){ achieved.add(a.id); ribbons+=60; xp+=50;
      feats.push(`🏆 ${a.name} · +60🎀`); } }
    const lvNow=levelFor(xp);
    let lvMsg='';
    if(lvNow.lv>prevLv){ const rw=lvNow.lv*25; ribbons+=rw; lvMsg=`⬆ LEVEL UP! PILOT LV ${lvNow.lv} · +${rw}🎀`; }
    saveWallet(); saveXp(); saveStats(); saveAch();
    document.getElementById('goXP').innerHTML=`+${xpGain} XP · Pilot LV ${lvNow.lv}`+(lvMsg?`<br><b style="color:var(--gold)">${lvMsg}</b>`:'');
    document.getElementById('goDaily').innerHTML=feats.join('<br>');
    document.getElementById('goScore').textContent=final.toLocaleString()+' m';
    const med=medalFor(final);
    document.getElementById('goMedal').innerHTML=med?`${med[0]}<small>${med[1]}</small>`:'';
    document.getElementById('goStats').textContent=`Best ${best.toLocaleString()} m · ${tricksLanded} tricks · ${dodges} dodges`;
    document.getElementById('goRibbons').innerHTML=`🎀 +${total} Ribbons${d.missions?` (incl. ${d.missions} from missions)`:''}`;
    document.getElementById('goNew').innerHTML=lastNewBest?'<span class="newbest">★ NEW RECORD ★</span>':'';
    document.getElementById('continue').style.display = usedRevive ? 'none' : '';
    document.getElementById('goLabel').textContent = pick(GO_LABELS);
    overEl.classList.remove('hidden');
  }

    }
    if(navigator.clipboard && navigator.clipboard.writeText){
      try{ await navigator.clipboard.writeText(txt); toast('Score copied to clipboard!'); return; }catch(e){}
    }
    try{ // legacy fallback for file:// or restricted contexts
      const ta=document.createElement('textarea'); ta.value=txt;
      ta.style.position='fixed'; ta.style.top='0'; ta.style.opacity='0';
      document.body.appendChild(ta); ta.focus(); ta.select();
      const ok=document.execCommand('copy'); document.body.removeChild(ta);
      toast(ok?'Score copied to clipboard!':txt);
    }catch(e){ toast(txt); }
  }

  // particles / floats
  function burst(x,y,color,n,spread,life){
    for(let i=0;i<n;i++){const a=rand(0,7),s=rand(spread*0.3,spread);
      particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life,max:life,size:rand(2,5),color});}
  }
  function popText(x,y,text,color){ floats.push({x,y,vy:-46,life:0.9,max:0.9,text,color}); }

  // spawning (all from above, scroll down)
  function spawnStars(){
    const n=Math.random()<0.6?1:3;
    const cx=rand(W*0.16,W*0.84), dir=Math.random()<0.5?1:-1;
    for(let i=0;i<n;i++) stars.push({x:clamp(cx+dir*i*40,W*0.08,W*0.92),y:-30-i*52,r:Math.max(8,GS*0.017),t:rand(0,6)});
  }
  function spawnGust(){ gusts.push({x:rand(W*0.14,W*0.86),y:-60,r:Math.max(18,GS*0.05),t:0}); }
  const BIRD_COLORS=[['#3a3a44','#e8a24a'],['#4a4036','#d98b3e'],['#2b2b33','#f0b35a'],['#534b5e','#e8a24a']];
  function hexRGB(h){ return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]; }
  function makeBird(x,y,r){
    const wave=Math.random()<0.75, col=BIRD_COLORS[(Math.random()*BIRD_COLORS.length)|0];
    return {x,baseX:x,y,r,vy:rand(28,84),wave,amp:rand(24,68),freq:rand(0.8,1.7),hunt:Math.random()<0.25,
      t:rand(0,6),flap:rand(0,6),flapSpeed:rand(6.5,9.5),bank:0,color:col[0],beak:col[1],rgb:hexRGB(col[0])};
  }
  function spawnBird(){
    const r=Math.max(12,GS*0.026);
    const pad=60+(climbSpeed+56)*0.35;   // reaction headroom: faster scroll = spawn farther up
    if(Math.random()<0.35){ // small flock
      const cx=rand(W*0.22,W*0.78), n=2+Math.floor(rand(0,2));
      for(let i=0;i<n;i++) birds.push(makeBird(clamp(cx+(i-(n-1)/2)*r*2.4,W*0.1,W*0.9), -pad-i*r*1.7, r*rand(0.85,1.05)));
    } else {
      birds.push(makeBird(rand(W*0.10,W*0.90), -pad, r*rand(0.85,1.15)));
    }
  }
  function spawnStorm(){ storms.push({x:rand(W*0.2,W*0.8),y:-130-climbSpeed*0.3,r:Math.max(42,GS*0.105),vy:rand(20,50),t:rand(0,6),bolt:0}); }
  function spawnPlane(){
    const dir=Math.random()<0.5?1:-1, r=Math.max(19,GS*0.07);
    planes.push({x:dir>0?-r*2:W+r*2, y:rand(-30,H*0.28), dir, vx:dir*rand(120,180), r, t:rand(0,6), blink:0});
  }
  function spawnSat(){
    sats.push({x:rand(W*0.18,W*0.82), y:-80-climbSpeed*0.3, r:Math.max(14,GS*0.042), vy:rand(12,30), vx:rand(-30,30), rot:rand(0,6), spin:rand(-0.6,0.6), blink:0});
  }
  function spawnCow(){
    const c=pick(CRITTERS), dir=Math.random()<0.5?1:-1, r=Math.max(19,GS*0.058);
    cows.push({x:dir>0?-r*2:W+r*2, dir, vx:dir*rand(70,110), y:rand(H*0.18,H*0.6), r, bob:rand(0,6), emoji:c[0], label:c[1], got:false});
  }

  function hitTest(a,b,f){ return Math.hypot(a.x-b.x,a.y-b.y) < (a.r+b.r)*f; }
  function onHit(){
    if(shieldT>0){ shieldT=0;invuln=0.9;popText(kite.x,kite.y-30,'BLOCKED','#7fe3ff');
      burst(kite.x,kite.y,'#7fe3ff',16,300,0.5);sfx.power();shakeMag=8;return; }
    lives--;combo=0;invuln=1.3;shakeMag=16; buzz(35); hitCount++;
    burst(kite.x,kite.y,'#ff7a5a',18,320,0.6);popText(kite.x,kite.y-30,'OUCH','#ff7a5a');sfx.hit();
    if(lives<=0) gameOver();
  }

  // ---- tricks & style ----
  function detectGesture(){
    if(gbuf.length<2) return;
    const a=gbuf[0], z=gbuf[gbuf.length-1], dt2=z.t-a.t;
    if(dt2<0.012) return;
    const vx=(z.x-a.x)/dt2, vy=(z.y-a.y)/dt2, sp=Math.hypot(vx,vy);
    if(sp<FLICK()) return;
    if(Math.abs(vy)<Math.abs(vx)*0.8) return;        // must be reasonably vertical
    if(vy>0) triggerTrick('dive'); else triggerTrick('loop');
    gbuf.length=0; trickCD=0.38;
  }
  function triggerTrick(type){
    if(trick) return;
    trickDone=true; trickHint=0; tricksLanded++; buzz(16);
    registerStyle();
    if(type==='dive'){
      trick={type,t:0,dur:0.45};
      const bonus=Math.round(16*styleMult);
      altitude+=bonus; popText(kite.x,kite.y-34,'DIVE! +'+bonus,'#ffd23f');
      sfx.gust(); shakeMag=Math.max(shakeMag,6);
    } else { // loop
      trick={type,t:0,dur:0.7};
      invuln=Math.max(invuln,0.95);
      popText(kite.x,kite.y-34,'LOOP!','#7fe3ff'); sfx.power();
    }
  }
  function registerStyle(){
    styleChain = styleTimer>0 ? styleChain+1 : 1;
    styleMult = Math.min(styleChain,5);
    styleTimer = 2.6;
    style = Math.min(1, style+0.34);
    if(style>=1){ // cash out a flow reward for chaining
      style=0; magnetT=Math.max(magnetT,4); boostT=Math.max(boostT,1.6);
      popText(kite.x,kite.y-58,'STYLE FLOW!','#ff9ad5'); burst(kite.x,kite.y,'#ffd23f',22,400,0.6);
    }
  }

  function smash(x,y){
    frenzyKills++; const pts=30; altitude+=pts; ribbonsThisRun+=2;
    popText(x,y,pick(['POW!','BAM!','SMASH!','BONK!','KAPOW!'])+' +'+pts,'#ffd23f');
    burst(x,y,'#ffd23f',16,340,0.55); beep(160,0.12,'square',0.2,90); buzz(14); shakeMag=Math.max(shakeMag,7);
  }
  function checkMissions(){
    for(const m of activeMissions){
      if(!m.done && missionProg(m)>=m.target){
        m.done=true; ribbonsFromMissions+=m.reward; saveMissions();
        banner={text:'MISSION! 🎀 +'+m.reward, sub:missionDesc(m), t:0, dur:2.6};
        burst(kite.x,kite.y,'#ffd23f',20,360,0.6); sfx.fanfare(); buzz(26);
      }
    }
  }

  // ---- update ----
  function update(dt){
    runTime+=dt;
    // launch charging
    if(phase==='launch'){
      if(ptr.active){ charging=true; charge=Math.min(1,charge+dt*1.6); }
      else if(charging){ charging=false; charge=Math.max(charge,0.5); doLaunch(); }
      kite.x=W/2+Math.sin(runTime*2)*4; kite.y=GROUND_BASE-26-charge*18;
      updateTail(dt,true);
      updateClouds(dt,0);
      return;
    }

    // timers
    if(invuln>0)invuln-=dt; if(shieldT>0)shieldT-=dt; if(magnetT>0)magnetT-=dt;
    if(boostT>0)boostT-=dt; if(shakeMag>0)shakeMag=Math.max(0,shakeMag-dt*60);
    if(steerHint>0)steerHint-=dt; if(trickCD>0)trickCD-=dt; if(trickHint>0)trickHint-=dt;
    blinkT-=dt; if(blinkT<-0.12) blinkT=rand(2.5,5.5);   // periodic blink
    if(frenzyT>0)frenzyT-=dt;
    if(styleTimer>0){ styleTimer-=dt; if(styleTimer<=0){ styleChain=0; styleMult=1; } }
    if(style>0 && styleTimer<=0) style=Math.max(0, style-dt*0.25);
    if(trick){ trick.t+=dt; if(trick.t>=trick.dur) trick=null; }

    // climb dynamics (dive briefly boosts the scroll for a real rush)
    const cruise=170+Math.min(altitude*0.06,260)+Math.min(Math.max(0,altitude-5000)*0.008,90);
    climbSpeed += (cruise-climbSpeed)*Math.min(1,dt*0.7);
    const diving = trick&&trick.type==='dive';
    const scroll=climbSpeed*(boostT>0?1.7:1)*(diving?1.8:1);
    altitude += scroll*dt*0.035;
    score = altitude;
    groundY = GROUND_BASE + altitude*GROUND_PXM;
    // altitude milestones → fanfare + banner + zone name
    const mile=Math.floor(altitude/500);
    if(mile>lastMile){ lastMile=mile; const m=mile*500;
      banner={text:m.toLocaleString()+' m', sub:zoneName(m), t:0, dur:2.4}; sfx.fanfare(); buzz(22); }
    if(banner){ banner.t+=dt; if(banner.t>=banner.dur) banner=null; }

    if(phase==='ascend'){
      kite.x += (W/2-kite.x)*Math.min(1,dt*4.5);
      kite.y += (BAND_Y-kite.y)*Math.min(1,dt*3.6);
      kite.angle = clamp((W/2-kite.x)*-0.002,-0.5,0.5);
      if(Math.abs(kite.y-BAND_Y)<20){ phase='climb'; steerHint=4.5; }
    } else { // climb — snappy, frame-rate-independent follow
      const active=ptr.active;
      // sample pointer path for flick detection
      if(active){ gbuf.push({x:ptr.x,y:ptr.y,t:runTime}); while(gbuf.length>1 && runTime-gbuf[0].t>0.16) gbuf.shift();
                  if(!trick && trickCD<=0) detectGesture(); }
      else gbuf.length=0;

      const tx = active ? clamp(ptr.x,W*0.08,W*0.92) : W/2;
      let ty = active ? clamp(ptr.y,H*0.16,H*0.66) : BAND_Y;
      let rate = active ? 18 : 2.6;              // high gain while steering, gentle drift when released
      if(diving){ const p=trick.t/trick.dur; ty=clamp(ty+Math.sin(p*Math.PI)*H*0.22, H*0.14, H*0.84); rate=24;
                  if(Math.random()<0.7) particles.push({x:kite.x+rand(-14,14),y:kite.y-rand(10,40),vx:0,vy:-260,life:0.3,max:0.3,size:rand(2,4),color:'rgba(255,247,236,.7)'}); }
      const f = 1-Math.exp(-rate*dt);
      const nx = kite.x+(tx-kite.x)*f;
      const ny = kite.y+(ty-kite.y)*f;
      kite.vx=(nx-kite.x)/Math.max(dt,1e-3);
      kite.vy=(ny-kite.y)/Math.max(dt,1e-3);
      kite.x=clamp(nx,W*0.06,W*0.94); kite.y=clamp(ny,H*0.14,H*0.86);
      kite.angle=clamp(kite.vx*0.0011,-0.6,0.6);
      // cosmetic trail
      const TD=trailDef();
      if(TD.color && (Math.hypot(kite.vx,kite.vy)>170||boostT>0||frenzyT>0) && Math.random()<0.5)
        particles.push({x:kite.x+rand(-8,8),y:kite.y+kite.r*0.9,vx:rand(-24,24),vy:rand(50,110),life:0.5,max:0.5,size:rand(2,4.5),color:TD.color()});
      // loop spin
      if(trick&&trick.type==='loop') spin=(trick.t/trick.dur)*Math.PI*2; else spin*=0.6;
      // trick tutorial hints (earlier, and again if the player hasn't tried one)
      if(!trickHintShown && altitude>80){ trickHintShown=true; trickHint=6; }
      if(!trickDone && !trickHint2Shown && altitude>320){ trickHint2Shown=true; trickHint=6; }
    }
    updateTail(dt,false);
    updateClouds(dt,scroll);
    // ghost-race recording (0.1s samples of the kite path)
    flightT+=dt; const fi=Math.floor(flightT/0.1);
    if(fi>recIdx){ recIdx=fi; if(recording.length<2600) recording.push([Math.round(kite.x),Math.round(kite.y)]); }
    bestHazardD=Infinity; eyeTo=null; dangerClose=false;   // reset googly-eye targeting

    // spawn timers
    tStar-=dt; tGust-=dt;
    if(tStar<=0){ spawnStars(); tStar=rand(0.9,1.6); }
    if(tGust<=0){ spawnGust(); tGust=rand(5,9); }
    if(phase==='climb' && altitude>80){
      tBird-=dt;
      if(tBird<=0){ spawnBird(); tBird=clamp(rand(0.9,1.7)-altitude*0.00018, Math.max(0.26,0.45-Math.max(0,altitude-5000)*0.00002), 1.7); }
      if(altitude>800){ tStorm-=dt; if(tStorm<=0){ spawnStorm(); tStorm=rand(5.5,9.5); } }
      if(altitude>1000){ tPlane-=dt; if(tPlane<=0){ spawnPlane(); tPlane=rand(6,11); } }
      if(altitude>1900){ tSat-=dt; if(tSat<=0){ spawnSat(); tSat=rand(5,9); } }
    }
    tCow-=dt; if(tCow<=0 && phase==='climb'){ spawnCow(); tCow=rand(16,30); }
    tFrenzy-=dt; if(tFrenzy<=0 && phase==='climb' && frenzyT<=0){ orbs.push({x:rand(W*0.2,W*0.8),y:-50,r:Math.max(14,GS*0.04),t:0}); tFrenzy=rand(24,40); }

    // move + collide
    for(let i=stars.length-1;i>=0;i--){const s=stars[i];s.t+=dt;
      if(magnetT>0){const dx=kite.x-s.x,dy=kite.y-s.y,d=Math.hypot(dx,dy);if(d<GS*0.45&&d>0){s.x+=dx/d*420*dt;s.y+=dy/d*420*dt;}}
      s.y+=scroll*dt;
      if(s.y>H+40){stars.splice(i,1);continue;}
      if(hitTest(kite,s,1.05)){combo++;starsHit++;if(combo>maxCombo)maxCombo=combo;const pts=Math.max(1,combo);score+=pts;altitude+=pts;
        burst(s.x,s.y,'#ffd23f',10,260,0.5);popText(s.x,s.y,combo>1?('+'+pts+' x'+combo):'+'+pts,'#ffe27a');
        sfx.collect(combo);buzz(8);stars.splice(i,1);}
    }
    for(let i=gusts.length-1;i>=0;i--){const g=gusts[i];g.t+=dt;g.y+=scroll*dt;
      if(g.y>H+50){gusts.splice(i,1);continue;}
      if(hitTest(kite,g,1.0)){boostT=2.4;altitude+=15;gustsGot++;
        const roll=Math.random();
        if(roll<0.30){shieldT=8;popText(g.x,g.y-30,'SHIELD','#7fe3ff');sfx.power();}
        else if(roll<0.55){magnetT=8;popText(g.x,g.y-30,'MAGNET','#ff9ad5');sfx.power();}
        else{popText(g.x,g.y,'+15 BOOST','#ffd23f');}
        burst(g.x,g.y,'#ffe27a',18,360,0.6);sfx.gust();shakeMag=Math.max(shakeMag,5);gusts.splice(i,1);}
    }
    for(let i=birds.length-1;i>=0;i--){const b=birds[i];b.t+=dt;b.flap+=b.flapSpeed*dt;
      const px=b.x;
      if(b.hunt) b.baseX+=clamp(kite.x-b.baseX,-46,46)*dt*0.7;   // some birds gently home in
      if(b.wave)b.x=b.baseX+Math.sin(b.t*b.freq)*b.amp; else b.x=b.baseX;
      b.y+=(scroll+b.vy)*dt;
      b.bank=clamp((b.x-px)/Math.max(dt,1e-3)*0.0016,-0.5,0.5);
      if(b.sayT>0) b.sayT-=dt;
      else if(!b.saidYet && b.y>H*0.12 && b.y<H*0.7 && Math.random()<0.012){ b.say=pick(['squawk!','caw!','mine!','tweet']); b.sayT=1.4; b.saidYet=true; }
      const d=Math.hypot(kite.x-b.x,kite.y-b.y);
      if(d<bestHazardD){bestHazardD=d;eyeTo={x:b.x,y:b.y};} if(d<(kite.r+b.r)*2.4)dangerClose=true;
      const hitR=(kite.r+b.r)*0.62, grazeR=(kite.r+b.r)*1.7;
      if(frenzyT>0 && d<(kite.r+b.r)*1.05){ smash(b.x,b.y); birds.splice(i,1); continue; }
      if(invuln<=0 && d<hitR){ onHit(); burst(b.x,b.y,'#e8e8ee',6,160,0.5); birds.splice(i,1); continue; }
      if(d<grazeR) b.grazed=true;                          // came close
      if(b.grazed && !b.grazeDone && (d>grazeR || b.y>kite.y+kite.r)){ // passed safely
        b.grazeDone=true; combo++; dodges++; if(combo>maxCombo)maxCombo=combo; const bonus=Math.round(4*styleMult); altitude+=bonus;
        styleTimer=Math.max(styleTimer,1.6);               // grazing keeps a style chain alive
        popText(b.x,b.y,(Math.random()<0.4?pick(GRAZE_QUIPS):'SWOOSH!')+' +'+bonus,'#a9f0ff'); burst(b.x,b.y,'#a9f0ff',8,200,0.4); sfx.collect(combo); buzz(6);
      }
      if(b.y>H+60){birds.splice(i,1);continue;}
    }
    for(let i=orbs.length-1;i>=0;i--){const o=orbs[i];o.t+=dt;o.y+=scroll*dt;
      if(o.y>H+50){orbs.splice(i,1);continue;}
      if(Math.hypot(kite.x-o.x,kite.y-o.y) < (kite.r+o.r)*1.05){
        frenzyT=5.2; invuln=Math.max(invuln,0.3);

      }
    }
    for(let i=cows.length-1;i>=0;i--){const c=cows[i];c.bob+=dt;c.x+=c.vx*dt;c.y+=scroll*0.6*dt+Math.sin(c.bob*2)*8*dt;
      if(c.x< -c.r*3 || c.x>W+c.r*3 || c.y>H+60){cows.splice(i,1);continue;}
      if(!c.got && Math.hypot(kite.x-c.x,kite.y-c.y) < (kite.r+c.r)*0.9){
        c.got=true; cowsGot++; const bonus=80+Math.round(40*styleMult); altitude+=bonus;
        popText(c.x,c.y-30,c.label+bonus,'#ffd23f'); burst(c.x,c.y,'#ffd23f',26,420,0.7); sfx.fanfare(); buzz(30);
        styleTimer=Math.max(styleTimer,2.0); cows.splice(i,1);

    }
    for(let i=storms.length-1;i>=0;i--){const s=storms[i];s.t+=dt;s.y+=(scroll+s.vy)*dt;
      if(Math.random()<0.02)s.bolt=0.18; if(s.bolt>0)s.bolt-=dt;
      const d=Math.hypot(kite.x-s.x,kite.y-s.y); if(d<bestHazardD){bestHazardD=d;eyeTo={x:s.x,y:s.y};} if(d<(kite.r+s.r)*1.8)dangerClose=true;
      if(s.y>H+140){storms.splice(i,1);continue;}
      if(frenzyT>0 && hitTest(kite,s,0.9)){ smash(s.x,s.y); storms.splice(i,1); continue; }
      if(invuln<=0&&hitTest(kite,s,0.6))onHit();
    }
    for(let i=planes.length-1;i>=0;i--){const p=planes[i];p.t+=dt;p.blink=(p.blink+dt)%1;
      p.x+=p.vx*dt; p.y+=scroll*0.5*dt;
      const d=Math.hypot(kite.x-p.x,kite.y-p.y); if(d<bestHazardD){bestHazardD=d;eyeTo={x:p.x,y:p.y};} if(d<(kite.r+p.r)*1.6)dangerClose=true;
      if(p.x< -p.r*2.5 || p.x>W+p.r*2.5 || p.y>H+80){planes.splice(i,1);continue;}
      if(frenzyT>0 && hitTest(kite,{x:p.x,y:p.y,r:p.r},0.7)){ smash(p.x,p.y); planes.splice(i,1); continue; }
      if(invuln<=0&&hitTest(kite,{x:p.x,y:p.y,r:p.r},0.42)){onHit();planes.splice(i,1);}
    }
    for(let i=sats.length-1;i>=0;i--){const s=sats[i];s.rot+=s.spin*dt;s.blink=(s.blink+dt)%1;
      s.x+=s.vx*dt; s.y+=(scroll+s.vy)*dt;
      const d=Math.hypot(kite.x-s.x,kite.y-s.y); if(d<bestHazardD){bestHazardD=d;eyeTo={x:s.x,y:s.y};} if(d<(kite.r+s.r)*2)dangerClose=true;
      if(s.y>H+90){sats.splice(i,1);continue;}
      if(frenzyT>0 && hitTest(kite,s,0.9)){ smash(s.x,s.y); sats.splice(i,1); continue; }
      if(invuln<=0&&hitTest(kite,s,0.6)){onHit();sats.splice(i,1);}
    }

    checkMissions();

    for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.life-=dt;p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=260*dt;p.vx*=0.96;if(p.life<=0)particles.splice(i,1);}

  function doLaunch(){
    phase='ascend'; climbSpeed=200+charge*260; kite.vy=-(260+charge*340); altitude+=4+charge*8;

  function updateTail(dt,grounded){
    const grav=grounded?120:220;
    const ax=kite.x, ay=kite.y+kite.r;
    tail[0].x=ax; tail[0].y=ay; tail[0].px=ax; tail[0].py=ay;
    const L=kite.r*0.78;
    for(let i=1;i<tail.length;i++){
      const p=tail[i];
      let vx=(p.x-p.px)*0.94, vy=(p.y-p.py)*0.94+grav*dt;
      p.px=p.x;p.py=p.y; p.x+=vx; p.y+=vy;
    }
    for(let k=0;k<3;k++){
      for(let i=1;i<tail.length;i++){
        const p=tail[i],q=tail[i-1];
        let dx=p.x-q.x,dy=p.y-q.y,d=Math.hypot(dx,dy)||0.001;
        const diff=(d-L)/d*0.5;
        const mx=dx*diff,my=dy*diff;
        if(i>1){q.x+=mx;q.y+=my;}
        p.x-=mx;p.y-=my;
      }
    }
  }
  function updateClouds(dt,scroll){
    for(const cl of clouds){
      cl.x+=cl.drift*dt; cl.y+=scroll*dt*(0.4+cl.s*0.35);
      if(cl.y>H+120){cl.y=-rand(40,160);cl.x=rand(0,W);}
      if(cl.x<-180)cl.x=W+60; if(cl.x>W+180)cl.x=-60;
    }
  }

  function skyColors(alt){

      t,

      mid: lerpC([176,212,242],[36,52,110], t),
      hor: lerpC([255,224,170],[90,60,130], t),

  }

    if(s.t>0.4){ ctx.fillStyle='rgba(255,255,255,'+((s.t-0.4)/0.6*0.85)+')';

  function drawKite(){
    const SK=skin();
    ctx.save();ctx.translate(kite.x,kite.y);ctx.rotate(kite.angle+spin);
    const r=kite.r, flashing=invuln>0&&Math.floor(invuln*16)%2===0;

    ctx.fillStyle=SK.wing;ctx.fill();
    ctx.beginPath();ctx.moveTo(0,-r*1.3);ctx.lineTo(r,0);ctx.lineTo(0,0);ctx.lineTo(-r,0);ctx.closePath();
    ctx.fillStyle=SK.body;ctx.fill();
    ctx.beginPath();ctx.moveTo(-r,0);ctx.lineTo(r,0);ctx.lineTo(0,r*0.5);ctx.closePath();
    ctx.fillStyle=SK.accent;ctx.fill();

  function drawStormObj(s){

      ctx.beginPath();ctx.moveTo(-4,s.r*0.4);ctx.lineTo(6,s.r*0.8);ctx.lineTo(-2,s.r*0.9);ctx.lineTo(8,s.r*1.3);ctx.stroke();}
    ctx.restore();
  }
  function drawPlane(p){
    const r=p.r, d=p.dir;            // nose points in travel direction
    ctx.save();ctx.translate(p.x,p.y);ctx.scale(d,1);
    // contrail
    ctx.strokeStyle='rgba(255,255,255,.18)';ctx.lineWidth=r*0.26;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(-r*1.2,0);ctx.lineTo(-r*3.4,-r*0.12);ctx.stroke();
    // tail fin
    ctx.fillStyle='#c9d2dc';ctx.beginPath();ctx.moveTo(-r*1.05,0);ctx.lineTo(-r*1.45,-r*0.6);ctx.lineTo(-r*0.8,-r*0.05);ctx.closePath();ctx.fill();
    // wings
    ctx.fillStyle='#aeb8c4';
    ctx.beginPath();ctx.moveTo(-r*0.1,0);ctx.lineTo(-r*0.7,r*0.7);ctx.lineTo(r*0.0,r*0.12);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(-r*0.1,0);ctx.lineTo(-r*0.7,-r*0.7);ctx.lineTo(r*0.0,-r*0.12);ctx.closePath();ctx.fill();
    // fuselage
    ctx.fillStyle='#eef2f6';
    ctx.beginPath();ctx.moveTo(r*1.4,0);ctx.quadraticCurveTo(r*0.6,-r*0.34,-r*1.1,-r*0.24);
    ctx.lineTo(-r*1.1,r*0.24);ctx.quadraticCurveTo(r*0.6,r*0.34,r*1.4,0);ctx.closePath();ctx.fill();
    // windows
    ctx.fillStyle='#3a6ea5';
    for(let i=0;i<5;i++){ctx.beginPath();ctx.arc(-r*0.6+i*r*0.32,-r*0.02,r*0.06,0,7);ctx.fill();}
    // blinking nav lights (red on one tip, green on other)
    const on=p.blink<0.5;
    ctx.fillStyle=on?'#ff4d4d':'rgba(255,77,77,.25)';ctx.beginPath();ctx.arc(-r*0.7,r*0.7,r*0.1,0,7);ctx.fill();
    ctx.fillStyle=!on?'#54ff7a':'rgba(84,255,122,.25)';ctx.beginPath();ctx.arc(-r*0.7,-r*0.7,r*0.1,0,7);ctx.fill();
    ctx.restore();
  }
  function drawSat(s){
    ctx.save();ctx.translate(s.x,s.y);ctx.rotate(s.rot);const r=s.r;
    // solar panels
    ctx.fillStyle='#2b4a8a';ctx.strokeStyle='#7fa8e0';ctx.lineWidth=1.5;
    ctx.fillRect(-r*1.9,-r*0.34,r*1.1,r*0.68);ctx.strokeRect(-r*1.9,-r*0.34,r*1.1,r*0.68);
    ctx.fillRect(r*0.8,-r*0.34,r*1.1,r*0.68);ctx.strokeRect(r*0.8,-r*0.34,r*1.1,r*0.68);
    ctx.strokeStyle='#9bbef0';ctx.beginPath();ctx.moveTo(-r*1.35,-r*0.34);ctx.lineTo(-r*1.35,r*0.34);ctx.moveTo(r*1.35,-r*0.34);ctx.lineTo(r*1.35,r*0.34);ctx.stroke();
    // body
    ctx.fillStyle='#d7dde6';ctx.fillRect(-r*0.55,-r*0.5,r*1.1,r*1.0);
    ctx.fillStyle='#b9c2cf';ctx.fillRect(-r*0.55,-r*0.5,r*1.1,r*0.22);
    // dish
    ctx.fillStyle='#eef2f6';ctx.beginPath();ctx.ellipse(0,r*0.1,r*0.32,r*0.22,0,0,7);ctx.fill();
    // blinking beacon
    ctx.fillStyle=s.blink<0.5?'#ffd23f':'rgba(255,210,63,.25)';ctx.beginPath();ctx.arc(0,-r*0.6,r*0.12,0,7);ctx.fill();
    ctx.restore();
  }

  function drawBanner(){
    if(!banner) return;
    const p=banner.t/banner.dur;
    const a = p<0.15 ? p/0.15 : (p>0.8 ? (1-p)/0.2 : 1);   // fade in/out
    const yy=H*0.3 - (1-a)*16;
    ctx.save();ctx.globalAlpha=clamp(a,0,1);ctx.textAlign='center';
    ctx.font='700 '+FS.big+'px Fredoka, sans-serif';
    ctx.fillStyle='#ffd23f';ctx.shadowColor='rgba(0,0,0,.45)';ctx.shadowBlur=14;ctx.shadowOffsetY=3;
    ctx.textBaseline='alphabetic';ctx.fillText(banner.text,W/2,yy);
    ctx.shadowBlur=0;ctx.shadowOffsetY=0;
    ctx.font='600 '+FS.head+'px Fredoka, sans-serif';ctx.fillStyle='#fff7ec';
    ctx.fillText(banner.sub,W/2,yy+Math.round(FS.big*0.75));
    ctx.restore();
  }

  function rrect(x,y,w,h,r){ r=Math.min(r,h/2,w/2); ctx.beginPath();
    ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath(); }
  function meter(x,y,w,h,frac,label,fill){
    ctx.fillStyle='rgba(10,18,38,.55)'; rrect(x,y,w,h,h/2); ctx.fill();
    const fw=Math.max(0,Math.min(1,frac))*w;
    if(fw>2){ ctx.fillStyle=fill; rrect(x,y,fw,h,h/2); ctx.fill(); }
    ctx.strokeStyle='rgba(255,255,255,.14)';ctx.lineWidth=1;
    for(let i=1;i<5;i++){ const tx=x+w*i/5; ctx.beginPath();ctx.moveTo(tx,y+2.5);ctx.lineTo(tx,y+h-2.5);ctx.stroke(); }
    ctx.strokeStyle='rgba(255,255,255,.24)';ctx.lineWidth=1; rrect(x,y,w,h,h/2); ctx.stroke();
    ctx.font='600 '+FS.tiny+'px Fredoka, sans-serif';ctx.textAlign='left';ctx.textBaseline='bottom';
    ctx.fillStyle='#fff7ec';ctx.shadowColor='rgba(0,0,0,.6)';ctx.shadowBlur=4; ctx.fillText(label,x+1,y-4); ctx.shadowBlur=0;
  }

  function pill(text,cx,cy){
    ctx.font='600 '+FS.body+'px Fredoka, sans-serif';
    const w=ctx.measureText(text).width+34, h=Math.round(FS.body*2.3);
    ctx.fillStyle='rgba(20,30,55,.55)';
    const x=cx-w/2,y=cy-h/2,rr=h/2;
    ctx.beginPath();ctx.moveTo(x+rr,y);ctx.arcTo(x+w,y,x+w,y+h,rr);ctx.arcTo(x+w,y+h,x,y+h,rr);
    ctx.arcTo(x,y+h,x,y,rr);ctx.arcTo(x,y,x+w,y,rr);ctx.closePath();ctx.fill();
    ctx.fillStyle='#fff7ec';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(text,cx,cy+1);
  }

  function drawHUD(){
    ctx.save();
    // score (top-right, under pause/sound, clear of the flight path)
    ctx.textAlign='right';ctx.textBaseline='top';
    ctx.font='700 '+FS.score+'px Fredoka, sans-serif';
    ctx.fillStyle='#fff7ec';ctx.shadowColor='rgba(0,0,0,.45)';ctx.shadowBlur=10;ctx.shadowOffsetY=2;
    ctx.fillText(Math.floor(displayScore).toLocaleString()+' m',W-16,TOPBAR_B);
    ctx.shadowBlur=0;ctx.shadowOffsetY=0;
    if(combo>1){ctx.font='600 '+FS.small+'px Fredoka, sans-serif';ctx.fillStyle='#ffd23f';
      ctx.fillText('Combo ×'+combo,W-16,TOPBAR_B+FS.score+6);}
    // lives (top-left, always visible)
    ctx.textAlign='left';ctx.textBaseline='top';ctx.shadowColor='rgba(0,0,0,.5)';ctx.shadowBlur=4;
    ctx.font=FS.body+'px Fredoka, sans-serif';
    let hs='';for(let i=0;i<3;i++)hs+=i<lives?'❤️':'🖤';ctx.fillText(hs,14,16);
    // zone (under hearts)
    ctx.font='600 '+FS.tiny+'px Fredoka, sans-serif';ctx.fillStyle='rgba(255,247,236,.8)';
    ctx.fillText(zoneName(altitude).toUpperCase(),16,16+FS.body+12);
    ctx.shadowBlur=0;

    // bottom-left meters: Style + Power, always side by side
    if(phase==='climb'||phase==='ascend'){
      const mh=12, my=H-30, gap=12, mw=Math.min(138,(W*0.56-gap)/2);
      meter(16, my, mw, mh, style, styleMult>1?('STYLE ×'+styleMult):'STYLE', styleTimer>0?'#ff9ad5':'#ffd23f');
      let pf=0, pl='POWER', pc='rgba(180,200,230,.3)';
      if(frenzyT>0){ const hue=(runTime*220)%360; pf=frenzyT/5.2; pl='FRENZY'; pc='hsl('+hue+',100%,60%)'; }
      else if(boostT>0){ pf=boostT/2.4; pl='BOOST'; pc='#ffe27a'; }
      meter(16+mw+gap, my, mw, mh, pf, pl, pc);
    }
    ctx.restore();

    if(phase==='launch'){
      const t=charging?'Release to LAUNCH! 🚀':'Tap to fly · hold for power ✊';
      pill(t,W/2,H*0.62);
      const mw=Math.min(W*0.6,260),mx=W/2-mw/2,my=H*0.68;
      ctx.fillStyle='rgba(255,255,255,.18)';ctx.fillRect(mx,my,mw,12);
      ctx.fillStyle='#ffd23f';ctx.fillRect(mx,my,mw*charge,12);
    } else if(steerHint>0){
      ctx.globalAlpha=clamp(steerHint,0,1);
      pill('Drag to steer  ◀ ▶',W/2,H*0.72);
      ctx.globalAlpha=1;
    } else if(trickHint>0){
      ctx.globalAlpha=clamp(trickHint,0,1);
      pill('Flick ↑ Loop  ·  Flick ↓ Dive',W/2,H*0.72);
      ctx.globalAlpha=1;
    }
  }

  function draw(){
    paintSky(altitude);
    const s=skyColors(altitude); nightT=s.t;
    ctx.save();ctx.globalAlpha=0.9;const c=lerpC([255,235,170],[225,232,255],s.t);
    ctx.fillStyle=rgb(c);ctx.shadowColor=rgb(c);ctx.shadowBlur=60;
    ctx.beginPath();ctx.arc(W*0.78,H*0.16,Math.max(26,W*0.07),0,7);ctx.fill();ctx.restore();

    drawClouds();

    let ox=0,oy=0; if(shakeMag>0){ox=rand(-shakeMag,shakeMag);oy=rand(-shakeMag,shakeMag);}
    ctx.save();ctx.translate(ox,oy);

    drawGround();
    drawString();
    drawTail();

    for(const st of storms)drawStormObj(st);
    for(const p of planes)drawPlane(p);
    for(const sa of sats)drawSat(sa);
    for(const g of gusts)drawGustObj(g);
    for(const o of orbs)drawOrb(o);
    for(const st of stars)drawStarObj(st);
    for(const b of birds)drawBird(b);
    for(const c of cows)drawCow(c);
    for(const p of particles){ctx.globalAlpha=Math.max(0,p.life/p.max);ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,7);ctx.fill();}
    ctx.globalAlpha=1;

    drawGhost();
    drawKite();

    ctx.textAlign='center';ctx.textBaseline='middle';
    for(const f of floats){ctx.globalAlpha=Math.max(0,f.life/f.max);
      ctx.font='600 '+FS.body+'px Fredoka, sans-serif';ctx.fillStyle=f.color;ctx.fillText(f.text,f.x,f.y);}
    ctx.globalAlpha=1;
    ctx.restore();

    // cinematic vignette
    const vg=ctx.createRadialGradient(W/2,H*0.46,Math.min(W,H)*0.34,W/2,H*0.5,Math.max(W,H)*0.72);
    vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,0.24)');
    ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
    if(frenzyT>0){ const hue=(runTime*200)%360; ctx.fillStyle='hsla('+hue+',100%,55%,'+(0.10+0.05*Math.sin(runTime*10))+')'; ctx.fillRect(0,0,W,H); }

    drawBanner();
    drawHUD();
  }

  function hill(yTop, color, amp, ph){
    ctx.fillStyle=color;ctx.beginPath();ctx.moveTo(0,H);ctx.lineTo(0,yTop);
    for(let x=0;x<=W;x+=24) ctx.lineTo(x, yTop + Math.sin(x*0.006+ph)*amp);
    ctx.lineTo(W,H);ctx.closePath();ctx.fill();
  }
  function tree(x,y,s){
    ctx.fillStyle='#6b4a2b';ctx.fillRect(x-s*0.12,y-s*0.5,s*0.24,s*0.6);
    ctx.fillStyle='#3f8f43';
    ctx.beginPath();ctx.arc(x,y-s*0.7,s*0.5,0,7);ctx.arc(x-s*0.4,y-s*0.45,s*0.38,0,7);ctx.arc(x+s*0.4,y-s*0.45,s*0.38,0,7);ctx.fill();
  }
  function flower(x,y,col){
    ctx.fillStyle=col;for(let a=0;a<5;a++){const an=a/5*7;ctx.beginPath();ctx.arc(x+Math.cos(an)*4,y+Math.sin(an)*4,2.6,0,7);ctx.fill();}
    ctx.fillStyle='#ffd23f';ctx.beginPath();ctx.arc(x,y,2.2,0,7);ctx.fill();
  }
  function drawMenuBG(dt){
    geom(); menuT+=dt;
    paintSky(0);
    // sun with soft rays
    const sx=W*0.78, sy=H*0.16, sr=Math.max(26,W*0.07);
    ctx.save();ctx.translate(sx,sy);ctx.globalAlpha=0.12;ctx.fillStyle='#fff3c4';
    for(let i=0;i<12;i++){ctx.rotate(Math.PI/6+Math.sin(menuT*0.2)*0.02);ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(sr*3.4,-sr*0.18);ctx.lineTo(sr*3.4,sr*0.18);ctx.closePath();ctx.fill();}
    ctx.restore();
    ctx.save();ctx.globalAlpha=0.95;ctx.fillStyle='rgb(255,235,170)';ctx.shadowColor='rgb(255,235,170)';ctx.shadowBlur=60;
    ctx.beginPath();ctx.arc(sx,sy,sr,0,7);ctx.fill();ctx.restore();
    updateClouds(dt,16); drawClouds();
    // a couple of distant birds gliding
    for(let i=0;i<2;i++){ const bx=(menuT*30+i*W*0.5)%(W+80)-40, by=H*0.26+i*26+Math.sin(menuT+i)*6;
      ctx.strokeStyle='rgba(40,40,60,.5)';ctx.lineWidth=2.5;ctx.beginPath();
      ctx.moveTo(bx-7,by);ctx.quadraticCurveTo(bx,by-5,bx+1,by);ctx.quadraticCurveTo(bx+2,by-5,bx+9,by);ctx.stroke(); }

    // layered rolling hills
    hill(H*0.74, '#bfe3a8', 14, 0.6);
    hill(H*0.80, '#8fce74', 18, 2.2);
    hill(H*0.86, '#5fae52', 16, 4.0);
    const gy=H*0.86;
    // foreground hill detail: trees + flowers
    tree(W*0.12,gy+H*0.02,46); tree(W*0.86,gy+H*0.03,40); tree(W*0.72,gy+H*0.05,30);
    for(let i=0;i<10;i++){ const fx=(i*97.3)%W, fy=gy+H*0.05+(i%3)*10+8; flower(fx,fy, i%2?'#ff7eb0':'#ffffff'); }

    // the kid flies the animated kite (ties menu to the game)
    const kidX=W*0.30, kidY=gy+6;
    const kx=W*0.5+Math.sin(menuT*0.55)*W*0.24, ky=H*0.30+Math.sin(menuT*1.1)*H*0.045, r=Math.max(16,Math.min(W,H)*0.05);
    const ang=Math.sin(menuT*0.55)*0.4;
    ctx.strokeStyle='rgba(255,247,236,.6)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(kidX+20,kidY-44);ctx.quadraticCurveTo((kidX+kx)/2,(kidY+ky)/2,kx,ky+r*0.4);ctx.stroke();
    // tail
    const MT=tailColors();
    for(let i=1;i<=3;i++){const ty=ky+r*1.2+i*r*0.5+Math.sin(menuT*3-i*0.6)*4, tx=kx+Math.sin(menuT*3-i*0.6)*r*0.5;
      ctx.fillStyle=i%2?MT[0]:MT[1];ctx.beginPath();ctx.arc(tx,ty,r*0.12,0,7);ctx.fill();}
    // kite
    const MK=skin();
    ctx.save();ctx.translate(kx,ky);ctx.rotate(ang);
    ctx.beginPath();ctx.moveTo(0,-r*1.3);ctx.lineTo(r,0);ctx.lineTo(0,r*1.3);ctx.lineTo(-r,0);ctx.closePath();ctx.fillStyle=MK.wing;ctx.fill();
    ctx.beginPath();ctx.moveTo(0,-r*1.3);ctx.lineTo(r,0);ctx.lineTo(0,0);ctx.lineTo(-r,0);ctx.closePath();ctx.fillStyle=MK.body;ctx.fill();
    ctx.beginPath();ctx.moveTo(-r,0);ctx.lineTo(r,0);ctx.lineTo(0,r*0.5);ctx.closePath();ctx.fillStyle=MK.accent;ctx.fill();
    ctx.restore();
    // little googly eyes on the menu kite too
    for(const s of [-1,1]){ ctx.fillStyle='#fff7ec';ctx.beginPath();ctx.arc(kx+s*r*0.42,ky-r*0.18,r*0.26,0,7);ctx.fill();
      ctx.fillStyle='#222';ctx.beginPath();ctx.arc(kx+s*r*0.42+Math.sin(menuT*2)*r*0.08,ky-r*0.18+r*0.06,r*0.12,0,7);ctx.fill(); }
    drawFlyerStatic(kidX,kidY);
  }
  function drawFlyerStatic(x,gy){
    ctx.save();ctx.translate(x,gy);
    ctx.fillStyle='rgba(0,0,0,.16)';ctx.beginPath();ctx.ellipse(0,2,18,5,0,0,7);ctx.fill();
    ctx.strokeStyle='#3b4a63';ctx.lineWidth=6;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(-5,-8);ctx.lineTo(-6,-1);ctx.moveTo(5,-8);ctx.lineTo(6,-1);ctx.stroke();
    ctx.fillStyle='#ff6b6b';ctx.beginPath();ctx.moveTo(-11,-9);ctx.quadraticCurveTo(-13,-28,0,-30);ctx.quadraticCurveTo(13,-28,11,-9);ctx.quadraticCurveTo(0,-5,-11,-9);ctx.closePath();ctx.fill();
    ctx.strokeStyle='#f2c79a';ctx.lineWidth=5;
    ctx.beginPath();ctx.moveTo(8,-26);ctx.lineTo(20,-44);ctx.stroke();
    ctx.beginPath();ctx.moveTo(-9,-22);ctx.lineTo(-15,-12);ctx.stroke();
    ctx.fillStyle='#f2c79a';ctx.beginPath();ctx.arc(20,-44,3.2,0,7);ctx.fill();
    ctx.beginPath();ctx.arc(0,-40,10,0,7);ctx.fill();
    ctx.fillStyle='#5a3a26';ctx.beginPath();ctx.arc(0,-42,10.5,Math.PI*1.05,Math.PI*2.0);ctx.fill();
    ctx.fillStyle='#3a2a20';ctx.beginPath();ctx.arc(-3.5,-40,1.3,0,7);ctx.fill();ctx.beginPath();ctx.arc(3.5,-40,1.3,0,7);ctx.fill();
    ctx.strokeStyle='#3a2a20';ctx.lineWidth=1.4;ctx.beginPath();ctx.arc(0,-37.5,3,0.15*Math.PI,0.85*Math.PI);ctx.stroke();
    ctx.fillStyle='rgba(255,120,120,.45)';ctx.beginPath();ctx.arc(-6,-37,2,0,7);ctx.fill();ctx.beginPath();ctx.arc(6,-37,2,0,7);ctx.fill();
    ctx.restore();
  }

  // loop
  let last=performance.now();
  geom(); makeClouds(); toMenu();
  function loop(now){
    let dt=(now-last)/1000;last=now; if(dt>0.05)dt=0.05;
    const pb=document.getElementById('pauseBtn'); pb.style.display = (state==='playing')?'flex':'none';
    if(state==='playing'){update(dt);draw();}
    else if(state==='paused'){ /* hold last frame under overlay */ }
    else drawMenuBG(dt);
    updateAmbience();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
  if('serviceWorker' in navigator){ try{ navigator.serviceWorker.register('service-worker.js').catch(()=>{}); }catch(e){} }
  document.addEventListener('visibilitychange',()=>{ last=performance.now();
    if(document.hidden){ if(state==='playing') pauseGame(); }
    else if(actx&&actx.state==='suspended'){ try{actx.resume();}catch(e){} } });
})();
</script>
</body>
</html>
